site_name: Idsec SDK
site_description: Golang Idsec SDK for CyberArk's Identity Security Platform
site_author: CyberArk
repo_url: https://github.com/cyberark/idsec-sdk-golang
edit_uri: edit/main/docs

nav:
  - Overview: index.md
  - Getting started: getting_started.md
  - Architecture: architecture.md
  - License: license.md
  - How to guides:
      - Work with profiles: howto/working_with_profiles.md
      - Work with Idsec cache: howto/working_with_idsec_cache.md
      - Simple SDK workflow: howto/simple_sdk_workflow.md
      - Policy:
          - DB Policy SDK workflow: howto/policy/db_policy_sdk_workflow.md
          - VM Policy SDK workflow: howto/policy/vm_policy_sdk_workflow.md
          - Cloud Access Policy SDK workflow: howto/policy/cloud_access_policy_sdk_workflow.md
  - Examples:
      - SDK examples: examples/sdk_examples.md
  - SDK overview:
      - Authenticators: sdk/authenticators.md
      - Services: sdk/services.md
      - Schemas: sdk/schemas.md
      - Pagination: sdk/pagination.md
  - Config:
      - Environment: config/environment.md
      - Telemetry: config/telemetry.md
      - Proxy: config/proxy.md
theme:
  name: material
  custom_dir: docs/overrides
  font:
    text: Ubuntu
  palette:
    - scheme: default
      primary: dark blue
      toggle:
        icon: material/toggle-switch-off-outline
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: teal
      toggle:
        icon: material/toggle-switch
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.top
    - navigation.instant
    - navigation.indexes
    - navigation.tracking
    - content.code.annotate
  icon:
    repo: fontawesome/brands/github
  logo: media/logo.svg
  favicon: media/favicon.ico

markdown_extensions:
  - admonition
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      linenums: true
  - pymdownx.details
  - pymdownx.snippets:
      base_path: "."
      check_paths: true
  - meta
  - toc:
      permalink: true
      toc_depth: 4
  - attr_list
  - pymdownx.emoji
  - pymdownx.inlinehilite
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format

copyright: Copyright &copy; 2023 CyberArk

plugins:
  - search
  - mike:
      alias_type: redirect
  - literate-nav:
      nav_file: SUMMARY.md
      markdown_extensions:
        - sane_lists
  - section-index
  - mkdocstrings
extra_css:
  - stylesheets/extra.css

extra:
  version:
    provider: mike
